<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILMA - Premium HMI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(100, 123, 108, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(100, 123, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(100, 123, 108, 0); }
        }
        .animate-pulse-slow {
            animation: pulse-glow 3s infinite;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-between p-6 bg-cover bg-center bg-no-repeat" 
      style="background-image: linear-gradient(rgba(15, 50, 85, 0.85), rgba(15, 50, 85, 0.85)), url('YOUR_PLANT_IMAGE.jpg');">

    <div class="w-full max-w-md flex justify-between gap-4">
        <div class="glass flex-1 p-4 rounded-3xl text-center">
            <p class="text-xs uppercase opacity-60 tracking-widest">Plant Health</p>
            <p class="text-xl font-semibold">82%</p>
        </div>
        <div class="glass flex-1 p-4 rounded-3xl text-center">
            <p class="text-xs uppercase opacity-60 tracking-widest">Indoor AQI</p>
            <p class="text-xl font-semibold text-green-300">Good</p>
        </div>
    </div>

    <div class="flex flex-col items-center">
        <div class="w-48 h-48 rounded-full flex flex-col items-center justify-center glass border-4 border-sage-500 animate-pulse-slow relative">
            <span class="text-xs uppercase opacity-70">Air Quality</span>
            <span class="text-6xl font-bold">82</span>
            <span class="text-sm opacity-70">Fair</span>
        </div>
    </div>

    <div class="w-full max-w-md glass rounded-[40px] p-8 space-y-8 mb-4">
        <div class="flex justify-between bg-black/20 rounded-full p-1">
            <button class="flex-1 py-2 rounded-full bg-white/20 font-medium">Auto</button>
            <button class="flex-1 py-2 rounded-full opacity-50">Night</button>
            <button class="flex-1 py-2 rounded-full opacity-50">Boost</button>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between text-sm opacity-70">
                <span>Fan Speed</span>
                <span>Level 3</span>
            </div>
            <input type="range" min="1" max="5" value="3" 
                   class="w-full h-2 bg-white/20 rounded-lg appearance-none cursor-pointer accent-white">
        </div>

        <button class="w-full py-4 bg-white text-blue-900 rounded-full font-bold text-lg shadow-xl active:scale-95 transition-transform">
            Turn Off
        </button>
    </div>

    <div class="flex gap-8 opacity-40 pb-2">
        <span>Home</span>
        <span>Insights</span>
        <span>Schedule</span>
    </div>

</body>
</html>
