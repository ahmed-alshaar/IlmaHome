<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILMA - Premium HMI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(100, 123, 108, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(100, 123, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(100, 123, 108, 0); }
        }
        .animate-pulse-slow {
            animation: pulse-glow 3s infinite;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="text-white h-screen flex flex-col items-center justify-between p-8 bg-cover bg-center bg-no-repeat overflow-hidden" 
      style="background-image: linear-gradient(rgba(15, 50, 85, 0.8), rgba(15, 50, 85, 0.9)), url('background.jpg');">

    <div class="w-full max-w-sm mt-4 flex justify-between gap-4">
        <div class="glass flex-1 p-4 rounded-[28px] text-center">
            <p class="text-[10px] uppercase opacity-50 tracking-[0.2em] mb-1">Plant</p>
            <p class="text-xl font-light">82%</p>
        </div>
        <div class="glass flex-1 p-4 rounded-[28px] text-center">
            <p class="text-[10px] uppercase opacity-50 tracking-[0.2em] mb-1">Indoor AQI</p>
            <p class="text-xl font-light text-green-300">Good</p>
        </div>
    </div>

    <div class="flex-grow flex items-center justify-center">
        <div class="w-60 h-60 rounded-full flex flex-col items-center justify-center glass border-2 border-white/10 animate-pulse-slow relative">
            <span class="text-[10px] uppercase opacity-50 tracking-[0.3em] mb-2">Air Quality</span>
            <span class="text-7xl font-extralight tracking-tighter">82</span>
            <span class="text-sm opacity-60 mt-2 font-light">FAIR</span>
        </div>
    </div>

    <div class="w-full max-w-sm glass rounded-[40px] p-6 space-y-6 mb-6">
        <div class="flex justify-between bg-black/30 rounded-full p-1.5">
            <button class="flex-1 py-2.5 rounded-full bg-white/20 text-sm font-medium">Auto</button>
            <button class="flex-1 py-2.5 rounded-full text-sm opacity-40">Night</button>
            <button class="flex-1 py-2.5 rounded-full text-sm opacity-40">Boost</button>
        </div>

        <div class="px-2">
            <div class="flex justify-between text-[11px] opacity-50 uppercase tracking-widest mb-4">
                <span>Fan Speed</span>
                <span>Level 3</span>
            </div>
            <input type="range" min="1" max="5" value="3" 
                   class="w-full h-1.5 bg-white/20 rounded-lg appearance-none cursor-pointer accent-white">
        </div>

        <button class="w-full py-4 bg-white text-[#0F3255] rounded-full font-bold text-base shadow-2xl active:scale-95 transition-all">
            Turn Off Device
        </button>
    </div>

</body>
</html>
