<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILMA - Senior HMI Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(100, 123, 108, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(100, 123, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(100, 123, 108, 0); }
        }
        .animate-pulse-slow { animation: pulse-glow 3s infinite; }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        /* Fixes the slider thumb for mobile touch */
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body class="text-white h-[100dvh] flex flex-col items-center justify-between p-6 bg-cover bg-center bg-no-repeat overflow-hidden" 
      style="background-image: linear-gradient(rgba(15, 50, 85, 0.8), rgba(15, 50, 85, 0.9)), url('background.jpg');">

    <div class="w-full max-w-sm pt-4">
        <div class="flex justify-between gap-3">
            <div class="glass flex-1 py-4 rounded-[24px] text-center">
                <p class="text-[9px] uppercase opacity-40 tracking-[0.2em] mb-1">Plant Health</p>
                <p class="text-lg font-light">82%</p>
            </div>
            <div class="glass flex-1 py-4 rounded-[24px] text-center">
                <p class="text-[9px] uppercase opacity-40 tracking-[0.2em] mb-1">Indoor AQI</p>
                <p class="text-lg font-light text-green-300">Good</p>
            </div>
        </div>
    </div>

    <div class="flex flex-col items-center justify-center py-8">
        <div class="w-56 h-56 rounded-full flex flex-col items-center justify-center glass border-white/10 animate-pulse-slow">
            <span class="text-[9px] uppercase opacity-40 tracking-[0.3em] mb-2">Air Quality</span>
            <span class="text-7xl font-extralight">82</span>
            <span class="text-xs opacity-50 mt-2 tracking-widest">FAIR</span>
        </div>
    </div>

    <div class="w-full max-w-sm glass rounded-[36px] p-6 mb-4 flex flex-col gap-6">
        <div class="flex justify-between bg-black/30 rounded-full p-1">
            <button class="flex-1 py-2 rounded-full bg-white/20 text-xs font-medium">Auto</button>
            <button class="flex-1 py-2 rounded-full text-xs opacity-40">Night</button>
            <button class="flex-1 py-2 rounded-full text-xs opacity-40">Boost</button>
        </div>

        <div class="px-1">
            <div class="flex justify-between text-[10px] opacity-40 uppercase tracking-widest mb-3">
                <span>Fan Speed</span>
                <span>Level 3</span>
            </div>
            <input type="range" min="1" max="5" value="3" 
                   class="w-full h-1 bg-white/20 rounded-lg appearance-none cursor-pointer accent-white">
        </div>

        <button class="w-full py-4 bg-white text-[#0F3255] rounded-full font-bold text-sm shadow-xl active:scale-95 transition-all">
            Turn Off Device
        </button>
    </div>

</body>
</html>
